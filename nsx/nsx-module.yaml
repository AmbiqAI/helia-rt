schema_version: 1

module:
  name: nsx-helia-rt
  type: algorithm
  version: "1.16.0" # x-release-please-version

support:
  ambiqsuite: true
  zephyr: false

summary: >-
  Ambiq-optimized TensorFlow Lite for Microcontrollers (TFLM) runtime.
  Built from source against the nsx-cmsis-nn (ns-cmsis-nn) kernel module.

capabilities:
  - inference
  - tflm
  - machine_learning
  - litert

use_cases:
  - on-device ML inference
  - tflite model deployment on Ambiq SoCs
  - keyword spotting and anomaly detection models

agent_keywords:
  - tflm
  - tensorflow
  - inference
  - litert
  - machine_learning
  - helia-rt
  - helia_rt
  - tflite

build:
  cmake:
    package: nsx_helia_rt
    targets:
      - nsx::helia_rt

depends:
  required:
    - nsx-core
    - nsx-soc-hal
    - nsx-cmsis-nn
  optional: []

compatibility:
  boards:
    - "*"
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
    - armclang
    - atfe
