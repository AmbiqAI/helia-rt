name: cmake-ssot-smoke

# Smoke gates for the CMake source-of-truth (issue #147).
# Validates that:
#   1. cmake/helia_rt_sources.cmake loads in script mode for every backend.
#   2. dump_manifest emits valid JSON with the expected schema.
#   3. The top-level CMakeLists configures + builds helia_rt::reference on host clang.
#   4. The upstream-sync invariant holds (no SSoT-time edits under tensorflow/, signal/,
#      python/tflite_micro/).
#   5. (Phase 2) nsx::helia_rt cross-compiles for Cortex-M55 against ns-cmsis-nn.
#   6. (Phase 4) zephyr/CMakeLists.txt builds helia_rt against the SSoT for qemu_cortex_m3.

on:
  pull_request:
    paths:
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'nsx/**'
      - 'tensorflow/lite/micro/**'
      - 'signal/**'
      - 'tools/cmsis_pack/**'
      - 'zephyr/**'
      - '.github/zephyr-smoke/**'
      - '.github/workflows/smoke_cmake.yml'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  manifest:
    name: dump_manifest (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend: [reference, cmsis_nn, helia]
    steps:
      - uses: actions/checkout@v7
      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake
      - name: Dump + validate JSON manifest
        run: |
          set -euo pipefail
          cmake -DBACKEND=${{ matrix.backend }} -P cmake/dump_manifest.cmake \
              > manifest.json
          python3 -c "
          import json, sys
          d = json.load(open('manifest.json'))
          assert d['schema'] == 'helia-rt-manifest-v1', d['schema']
          assert d['backend'] == '${{ matrix.backend }}', d['backend']
          assert len(d['include_dirs'])  >= 4
          assert len(d['common_sources']) >= 30
          assert len(d['kernel_sources']) >= 100
          # Path well-formedness: nothing absolute, no '..'.
          for s in d['common_sources'] + d['kernel_sources']:
              assert not s.startswith('/'),  s
              assert '..' not in s.split('/'), s
          # Backend define contract. The helia backend additionally
          # carries per-kernel optimization defines defaulted to SPEED
          # (see HELIA_RT_GLOBAL_KERNEL_OPTIMIZE / _CONV_OPT / _FC_OPT in
          # cmake/helia_rt_sources.cmake).
          want = {
              'reference': [],
              'cmsis_nn':  ['CMSIS_NN'],
              'helia':     ['CMSIS_NN', 'HELIA',
                            'CONV_KERNEL_OPTIMIZED_FOR_SPEED',
                            'FC_KERNEL_OPTIMIZED_FOR_SPEED',
                            'KERNELS_OPTIMIZED_FOR_SPEED'],
          }['${{ matrix.backend }}']
          assert d['backend_defines'] == want, (d['backend_defines'], want)
          print(f\"OK: backend={d['backend']} kernels={len(d['kernel_sources'])} \"
                f\"common={len(d['common_sources'])} defs={d['backend_defines']}\")
          "

  host-build:
    name: Configure + build helia_rt::reference (host clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build clang
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
              -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
              -DHELIA_RT_BUILD_TYPE=release_with_logs \
              -DHELIA_RT_DISABLE_X86_NEON=ON
      - name: Build
        run: cmake --build build --target helia_rt_reference -j
      - name: Sanity check archive
        run: |
          test -f build/libhelia_rt_reference.a
          ls -lh build/libhelia_rt_reference.a

  invariant:
    name: Upstream-sync invariant (no SSoT edits under tensorflow/, signal/)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check diff scope
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          range="$base...$head"
          # SSoT branches (those that touch cmake/ or root CMakeLists.txt) MUST NOT
          # also touch upstream-managed paths. PRs that legitimately need to do so
          # should be split.
          # Use the PR merge-base diff so branches cut from older tags do not
          # inherit unrelated main-branch churn into this invariant check.
          if git diff --name-only "$range" -- cmake/ CMakeLists.txt \
                | grep -q .; then
              echo "PR touches SSoT files — verifying upstream paths are untouched..."
              # Allow the small set of upstream-owned paths that currently need
              # heliaRT-local divergence for generic CMake integration. Keep
              # this list narrow so the invariant still catches accidental drift.
              bad=$(git diff --name-only "$range" -- \
                      tensorflow/ signal/ python/tflite_micro/ \
                      tensorflow/lite/micro/tools/make/ \
                    | grep -Ev '^tensorflow/lite/micro/(helia_rt_version|heliart_version)\.h$' \
                    | grep -Ev '^tensorflow/lite/micro/tools/ci_build/(package_helia_bundle|release_asset_helpers)\.sh$' \
                    | grep -Ev '^tensorflow/lite/micro/kernels/ethos_u/ethosu\.cc$' \
                    | grep -Ev '^tensorflow/lite/micro/micro_mutable_op_resolver\.h$' \
                    || true)
              if [ -n "$bad" ]; then
                  echo "::error::SSoT PR also edits upstream-managed paths:"
                  echo "$bad"
                  exit 1
              fi
              echo "OK: SSoT-only change, upstream paths untouched."
          else
              echo "Not an SSoT change; invariant trivially holds."
          fi

  cmsis-pack-build:
    name: Build CMSIS-Pack from SSoT manifest
    runs-on: ubuntu-latest
    env:
      CMSIS_TOOLBOX_VERSION: 2.13.0
    steps:
      - uses: actions/checkout@v7
      - name: Install cmake + CMSIS-Toolbox
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake curl ca-certificates
          curl -fsSL \
              "https://github.com/Open-CMSIS-Pack/cmsis-toolbox/releases/download/${CMSIS_TOOLBOX_VERSION}/cmsis-toolbox-linux-amd64.tar.gz" \
              -o /tmp/cmsis-toolbox.tar.gz
          sudo tar -C /opt -xzf /tmp/cmsis-toolbox.tar.gz
          echo "/opt/cmsis-toolbox-linux-amd64/bin" >> "${GITHUB_PATH}"
          /opt/cmsis-toolbox-linux-amd64/bin/packchk --version
      - name: Build pack
        run: |
          set -euo pipefail
          python3 tools/cmsis_pack/build_pack.py --output dist --keep-stage
          ls -lh dist/
      - name: Validate pack with packchk
        run: |
          set -euo pipefail
          PACK=$(ls dist/Ambiq.helia-rt.*.pack | head -1)
          STAGE="${PACK%.pack}.stage"
          packchk --disable-validation "${STAGE}/Ambiq.helia-rt.pdsc"
      - name: Validate pack archive + pdsc
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, subprocess, zipfile, sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          packs = list(Path('dist').glob('Ambiq.helia-rt.*.pack'))
          assert len(packs) == 1, packs
          pack = packs[0]
          assert pack.stat().st_size > 100_000, f'pack too small: {pack.stat().st_size}'
          assert pack.stat().st_size < 50 * 1024 * 1024, (
              f'pack too large ({pack.stat().st_size} bytes); deny-list regression?'
          )

          with zipfile.ZipFile(pack) as zf:
              names = set(zf.namelist())
              pdsc_name = next(n for n in names if n.endswith('.pdsc'))
              root = ET.fromstring(zf.read(pdsc_name))
              assert root.tag == 'package', root.tag

              variants = {c.get('Cvariant') for c in root.findall('components/component')}
              assert variants == {'Reference', 'CMSIS-NN', 'HELIA'}, variants

              # Every <file category="source"> must resolve in the archive.
              missing = []
              for f in root.findall('components/component/files/file'):
                  if f.get('category') in ('source', 'preIncludeGlobal'):
                      if f.get('name') not in names:
                          missing.append(f.get('name'))
              assert not missing, f'missing in archive: {missing[:5]}'
          print(f'OK: pack={pack.name} size={pack.stat().st_size:,} variants={sorted(variants)}')
          PY
      - name: Validate pdsc contract (identity + ns-cmsis-nn pin)
        run: |
          set -euo pipefail
          PACK=$(ls dist/Ambiq.helia-rt.*.pack | head -1)
          python3 tools/cmsis_pack/check_pdsc.py "${PACK}"
      - name: Upload pack artifact
        uses: actions/upload-artifact@v7
        with:
          name: helia-rt-cmsis-pack
          path: dist/Ambiq.helia-rt.*.pack
          if-no-files-found: error

  nsx-cross-build:
    name: nsx::helia_rt cross-compile (Cortex-M55, gcc)
    runs-on: ubuntu-latest
    # ns-cmsis-nn is a private repo. PRs from forks won't have access to the
    # secret; skip cleanly there to avoid spurious failures.
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      # Pinned to the ns-cmsis-nn release whose CMake / Zephyr / NSX / CMSIS-Pack
      # surfaces align with heliaRT. Bump in lockstep with NS_CMSIS_NN_MIN_VERSION
      # in tools/cmsis_pack/build_pack.py.
      NS_CMSIS_NN_REF: v7.25.0
    steps:
      - name: Checkout helia-rt
        uses: actions/checkout@v7
        with:
          path: helia-rt
      - name: Checkout ns-cmsis-nn (pinned ref)
        env:
          NS_CMSIS_NN_TOKEN: ${{ secrets.NS_CMSIS_NN_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NS_CMSIS_NN_TOKEN:-}" ]; then
            echo "::error::secrets.NS_CMSIS_NN_SSH_KEY is empty; cannot clone ns-cmsis-nn"
            exit 1
          fi
          git clone --depth 1 --branch "${NS_CMSIS_NN_REF}" \
              "https://${NS_CMSIS_NN_TOKEN}@github.com/AmbiqAI/ns-cmsis-nn.git" \
              ns-cmsis-nn
          (cd ns-cmsis-nn && git rev-parse HEAD)
      - name: Install cross toolchain + ninja
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              cmake ninja-build gcc-arm-none-eabi \
              libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
          arm-none-eabi-gcc --version | head -1
          # Confirm libc headers (string.h etc.) and libgcc are reachable.
          arm-none-eabi-gcc -print-sysroot
          arm-none-eabi-gcc -E -x c -include string.h /dev/null > /dev/null
          echo "OK: libc headers reachable"
      - name: Write smoke harness
        run: |
          mkdir -p smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.21)
          project(nsx_helia_rt_smoke C CXX ASM)

          # Stub of the NSX board flags interface that real boards ship.
          add_library(nsx_board_flags INTERFACE)
          target_compile_options(nsx_board_flags INTERFACE
              -mcpu=cortex-m55 -mthumb -mfloat-abi=hard -mfpu=fpv5-d16
              -ffunction-sections -fdata-sections
              -Wno-unused-parameter)
          target_compile_definitions(nsx_board_flags INTERFACE
              ARM_MATH_LOOPUNROLL ARM_MATH_DSP)
          set(NSX_BOARD_FLAGS_TARGET nsx_board_flags)
          set(NSX_SOC_FAMILY apollo510)

          # Stub SoC HAL — the real module ships from nsx-soc-hal.
          add_library(nsx_soc_hal INTERFACE)

          add_subdirectory(${NS_CMSIS_NN_DIR}/nsx ns_cmsis_nn EXCLUDE_FROM_ALL)
          add_subdirectory(${HELIA_RT_DIR}/nsx   nsx_helia_rt   EXCLUDE_FROM_ALL)
          EOF
          cat > smoke/toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Generic)
          set(CMAKE_SYSTEM_PROCESSOR cortex-m55)
          set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)
          set(CMAKE_C_COMPILER   arm-none-eabi-gcc)
          set(CMAKE_CXX_COMPILER arm-none-eabi-g++)
          set(CMAKE_ASM_COMPILER arm-none-eabi-gcc)
          set(CMAKE_C_FLAGS_INIT
              "-mcpu=cortex-m55 -mthumb -mfloat-abi=hard -mfpu=fpv5-d16")
          set(CMAKE_CXX_FLAGS_INIT
              "-mcpu=cortex-m55 -mthumb -mfloat-abi=hard -mfpu=fpv5-d16 \
               -fno-exceptions -fno-rtti")
          EOF
      - name: Configure (Cortex-M55, gcc, release-with-logs)
        run: |
          cmake -S smoke -B smoke/build -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="$(pwd)/smoke/toolchain.cmake" \
              -DHELIA_RT_DIR="$(pwd)/helia-rt" \
              -DNS_CMSIS_NN_DIR="$(pwd)/ns-cmsis-nn" \
              -DHELIA_RT_VARIANT=release-with-logs
      - name: Build helia_rt::helia + nsx_helia_rt_glue + nsx::cmsis_nn
        run: |
          cmake --build smoke/build \
              --target helia_rt_helia helia_rt_reference nsx_helia_rt_glue nsx_cmsis_nn \
              -j
      - name: Sanity check archives
        run: |
          set -euo pipefail
          find smoke/build -name 'lib*.a' | sort
          test -f smoke/build/nsx_helia_rt/helia-rt-src/libhelia_rt_helia.a
          test -f smoke/build/ns_cmsis_nn/libnsx_cmsis_nn.a
          # Confirm objects are Cortex-M (Thumb) ELF.
          file smoke/build/nsx_helia_rt/helia-rt-src/libhelia_rt_helia.a | head -1
          arm-none-eabi-objdump -a smoke/build/nsx_helia_rt/helia-rt-src/libhelia_rt_helia.a \
              | head -5

      # Cover the reference backend in a separate build dir. The cmsis_nn
      # backend requires upstream CMSIS-NN headers (ns-cmsis-nn has modified
      # API signatures) and is tested via the dump_manifest + Zephyr jobs
      # which use the correct upstream provider.
      - name: Configure + build (reference backend)
        run: |
          cmake -S smoke -B smoke/build-reference -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE="$(pwd)/smoke/toolchain.cmake" \
              -DHELIA_RT_DIR="$(pwd)/helia-rt" \
              -DNS_CMSIS_NN_DIR="$(pwd)/ns-cmsis-nn" \
              -DNSX_HELIA_RT_BACKEND=reference \
              -DHELIA_RT_VARIANT=release-with-logs
          cmake --build smoke/build-reference \
              --target helia_rt_reference nsx_helia_rt_glue -j
          test -f smoke/build-reference/nsx_helia_rt/helia-rt-src/libhelia_rt_reference.a

  zephyr-build:
    name: Zephyr module build (qemu_cortex_m3, REFERENCE)
    runs-on: ubuntu-latest
    # Use the official Zephyr CI image: SDK, west, python, and arm-zephyr-eabi
    # toolchain are pre-installed at /opt/toolchains. The image does NOT ship
    # a checked-out zephyr tree, so we `west init` one ourselves below.
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4
      options: --user root
    # The zephyrproject-rtos/ci image's default shell is /bin/sh (dash),
    # which does not support `set -o pipefail`. Force bash for every
    # `run:` step in this job.
    defaults:
      run:
        shell: bash
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_REF: v4.0.0
    steps:
      - name: Checkout helia-rt
        uses: actions/checkout@v7
        with:
          path: helia-rt
      - name: Locate Zephyr SDK in CI image
        run: |
          set -euo pipefail
          # The ghcr.io/zephyrproject-rtos/ci image installs the SDK under
          # /opt/toolchains/zephyr-sdk-<ver>, but doesn't export
          # ZEPHYR_SDK_INSTALL_DIR for non-default shells, so CMake's
          # find_package(Zephyr-sdk) fails. Discover and export it.
          sdk_dir=$(find /opt -maxdepth 3 -type d -name 'zephyr-sdk-*' \
                      -not -name '*minimal*' | sort | tail -1)
          test -n "$sdk_dir" || (echo "::error::No zephyr-sdk found under /opt"; \
                                 ls /opt; exit 1)
          echo "Zephyr SDK: $sdk_dir"
          echo "ZEPHYR_SDK_INSTALL_DIR=$sdk_dir" >> "$GITHUB_ENV"
      - name: West init + update zephyr (shallow)
        run: |
          set -euo pipefail
          mkdir -p zephyrworkspace
          cd zephyrworkspace
          west init -m https://github.com/zephyrproject-rtos/zephyr \
              --mr "${ZEPHYR_REF}" .
          # --narrow keeps to manifest projects (no optional groups);
          # -o=--depth=1 makes each project a shallow clone. Keeps the
          # smoke under ~3 min instead of >10.
          west update --narrow -o=--depth=1
          west zephyr-export
          echo "ZEPHYR_BASE=$(pwd)/zephyr" >> "$GITHUB_ENV"
          (cd zephyr && git rev-parse --short HEAD)
      - name: Build smoke app for qemu_cortex_m3
        run: |
          set -euo pipefail
          # EXTRA_ZEPHYR_MODULES adds helia-rt to Zephyr's module list, which
          # picks up zephyr/module.yml + zephyr/CMakeLists.txt + zephyr/Kconfig.
          west build \
              -b qemu_cortex_m3 \
              -d build \
              -p always \
              helia-rt/.github/zephyr-smoke \
              -- \
              -DEXTRA_ZEPHYR_MODULES="$(pwd)/helia-rt"
      - name: Sanity check ELF + helia_rt symbols
        run: |
          set -euo pipefail
          test -f build/zephyr/zephyr.elf
          ls -lh build/zephyr/zephyr.elf
          # The Zephyr SDK toolchain binaries live under $ZEPHYR_SDK_INSTALL_DIR
          # but aren't on PATH by default in CI. Add them.
          export PATH="${ZEPHYR_SDK_INSTALL_DIR}/arm-zephyr-eabi/bin:$PATH"
          # Confirm the heliaRT TFLM runtime actually linked in (not GC'd).
          arm-zephyr-eabi-nm -C build/zephyr/zephyr.elf \
              | grep -E ' T .*(MicroPrintf|MicroAllocator|MicroInterpreter)' \
              | head -5
