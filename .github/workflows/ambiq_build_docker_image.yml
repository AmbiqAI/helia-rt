name: Build TFLM CI Docker Image

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      trigger-sha:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest-md

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.trigger-sha || 'main' }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ghcr.io/ambiqai/helios-rt-ci:latest -f .devcontainer/Dockerfile .

      - name: Push Docker Image
        run: docker push ghcr.io/ambiqai/helios-rt-ci:latest
