name: HeliaRT Release

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (branch, commit, or tag) to build"
        required: true
        type: string
      tag:
        description: "Release tag name"
        required: false
        type: string
      upload_to_release:
        description: "Upload the generated bundle to the GitHub release"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, commit, or tag) to build"
        required: true
        default: main
      tag:
        description: "Release tag name (defaults to ref)"
        required: false
        default: ""
      upload_to_release:
        description: "Upload the generated bundle to the GitHub release"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: helia-release-${{ inputs.tag || inputs.ref || github.sha }}
  cancel-in-progress: false

jobs:
  build:
    name: Build heliaRT (${{ matrix.arch }} • ${{ matrix.toolchain }} • ${{ matrix.build }})
    runs-on: ubuntu-latest-md
    container:
      image: ghcr.io/ambiqai/helia-rt-ci:latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        arch: [ "cortex-m4+fp", "cortex-m55" ]
        build: [ "debug", "release", "release_with_logs" ]
        toolchain: [ "gcc", "armclang" ]

    env:
      ARM_UBL_LICENSE_IDENTIFIER: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}
      NS_CMSIS_NN_SSH_KEY: ${{ secrets.NS_CMSIS_NN_SSH_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Mark workspace safe
        run: git config --global --add safe.directory '*'

      - name: Cache third-party downloads
        uses: actions/cache@v3
        with:
          path: tensorflow/lite/micro/tools/make/downloads
          key: ${{ runner.os }}-third-party-downloads-${{ hashFiles('tensorflow/lite/micro/tools/make/Makefile','tensorflow/lite/micro/tools/make/third_party_downloads.inc') }}
          restore-keys: ${{ runner.os }}-third-party-downloads-

      - name: Validate armclang license
        if: ${{ matrix.toolchain == 'armclang' }}
        run: |
          if [[ -z "${ARM_UBL_LICENSE_IDENTIFIER}" ]]; then
            echo "::error ::ARM_UBL_LICENSE_IDENTIFIER is required for armclang builds."
            exit 1
          fi

      - name: Build heliaRT static lib
        run: |
          set -euo pipefail
          OUTDIR="${GITHUB_WORKSPACE}/out/${{ matrix.arch }}/${{ matrix.toolchain }}/${{ matrix.build }}"
          tensorflow/lite/micro/tools/ci_build/build_helia.sh \
            -a "${{ matrix.arch }}" \
            -b "${{ matrix.build }}" \
            -t "${{ matrix.toolchain }}" \
            -o "${OUTDIR}"
          echo "Produced files:"
          find "${OUTDIR}" -maxdepth 3 -type f -print

      - name: Upload build combo
        uses: actions/upload-artifact@v4
        with:
          name: helia-rt-combo-${{ matrix.arch }}-${{ matrix.toolchain }}-${{ matrix.build }}
          path: out/${{ matrix.arch }}/${{ matrix.toolchain }}/${{ matrix.build }}/**

  package:
    name: Package heliaRT bundle
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Determine tag/ref
        id: info
        run: |
          tensorflow/lite/micro/tools/ci_build/resolve_release_meta.sh \
            --ref '${{ inputs.ref }}' \
            --tag '${{ inputs.tag }}'
          echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Download all build combos
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Assemble unified heliaRT bundle
        run: |
          tensorflow/lite/micro/tools/ci_build/package_helia_bundle.sh \
            --artifacts-dir artifacts \
            --checkout-dir "${GITHUB_WORKSPACE}" \
            --tag '${{ steps.info.outputs.tag }}' \
            --sha '${{ steps.info.outputs.sha }}' \
            --upload-dir upload

      - name: List bundle
        run: ls -1 upload/*.zip

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: helia-rt-bundle-${{ steps.info.outputs.tag }}
          path: upload/*.zip

      - name: Upload bundle to release (gh)
        if: ${{ inputs.upload_to_release == true || inputs.upload_to_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source tensorflow/lite/micro/tools/ci_build/release_asset_helpers.sh
          upload_bundle_to_release \
            '${{ steps.info.outputs.tag }}' \
            "upload/helia-rt-${{ steps.info.outputs.tag }}.zip" \
            "${GITHUB_REPOSITORY}"
