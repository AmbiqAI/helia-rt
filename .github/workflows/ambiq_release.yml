name: Ambiq Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest-md
    container:
      image: ghcr.io/ambiqai/helia-rt-ci:latest
    env:
      tag: ${{ github.ref_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      - name: Create artifacts
        env:
          NS_CMSIS_NN_SSH_KEY: ${{ secrets.NS_CMSIS_NN_SSH_KEY }}
          ARM_UBL_LICENSE_IDENTIFIER: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}
        run: |
          mkdir -p artifacts
          # Create neuralSPOT module
          bash ./neuralspot/build.sh
          cd ${GITHUB_WORKSPACE}/build
          zip -r ../artifacts/helia-rt-$tag.zip *
          # Create a snapshot of the repository
          cd ${GITHUB_WORKSPACE}
          git archive --format zip    --output artifacts/repo-snapshot-$tag.zip HEAD
          git archive --format tar.gz --output artifacts/repo-snapshot-$tag.tar.gz HEAD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

  release:
    runs-on: ubuntu-latest
    needs: build
    env:
      tag: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
          merge-multiple: true

      - name: Create release
        id: create_release
        run: |
          ls -R artifacts
          cd artifacts
          gh release create "$tag" \
            helia-rt-$tag.zip \
            repo-snapshot-$tag.zip \
            repo-snapshot-$tag.tar.gz \
            -R "$GITHUB_REPOSITORY" \
            -t "Release $tag" \
            --generate-notes
          if [[ "$tag" == *"-rc"* ]]; then
            gh release edit "$tag" --prerelease
          fi
