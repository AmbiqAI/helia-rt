name: Ambiq Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest-md
    container:
      image: ghcr.io/ambiqai/ns-tflm-ci:latest
    env:
      tag: ${{ github.ref_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Configure Git safe directory
        run: git config --global --add safe.directory '*'

      - name: Create neuralSPOT module
        run: |
          bash ./neuralspot/build.sh
          cd ./build
          zip -r ../ns-tflm-$tag.zip *
          tar -czf ../ns-tflm-$tag.tar.gz *

      - name: Create snapshot archives
        run: |
          git archive --format zip    --output repo-snapshot-$tag.zip HEAD
          git archive --format tar.gz --output repo-snapshot-$tag.tar.gz HEAD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ns-tflm-$tag.zip
            ns-tflm-$tag.tar.gz
            repo-snapshot-$tag.zip
            repo-snapshot-$tag.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    env:
      tag: ${{ github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$tag" \
            ns-tflm-$tag.zip \
            ns-tflm-$tag.tar.gz \
            repo-snapshot-$tag.zip \
            repo-snapshot-$tag.tar.gz \
            -R "$GITHUB_REPOSITORY" \
            -t "Release $tag" \
            --notes "Automated release for tag $tag"
