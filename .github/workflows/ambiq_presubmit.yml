name: Ambiq Presubmit

on:
  workflow_call:

jobs:
  mve_unit_tests:
    runs-on: ubuntu-latest

    name: MVE Unit Tests (presubmit)
    steps:
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - uses: actions/checkout@v3
      - name: Test
        uses: docker://ghcr.io/ambiqai/ns-tflm-ci:latest
        with:
          args: /bin/sh -c tensorflow/lite/micro/tools/ci_build/test_ambiq_corstone_300.sh
