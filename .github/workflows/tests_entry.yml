# tests_entry.yml
# Entry point to the test suites
#
# - If ci:run_full label is on PR, run the ci workflow as well.
#
# This script runs the test scripts directly. Scheduled or manual runs use
# run_<scriptname>.yml as the entry point.

name: Tests Entry Point
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - labeled

# Cancel an in-flight run for this PR when a newer commit is pushed.
# Keyed on the PR number (or branch ref for non-PR triggers) so each PR
# has its own concurrency lane and unrelated PRs don't block each other.
# Saves ~25min x 10 matrix jobs every fixup push.
concurrency:
  group: tests-entry-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  helia-test:
    uses: ./.github/workflows/helia_test.yml
    with:
      trigger-sha: ${{ github.event.pull_request.head.sha }}
    secrets:
      NS_CMSIS_NN_SSH_KEY: ${{ secrets.NS_CMSIS_NN_SSH_KEY }}

  ci-run:
    if: ${{ contains(github.event.pull_request.labels.*.name, 'ci:run_full') }}
    uses: ./.github/workflows/ci.yml
    with:
      trigger-sha: ${{ github.event.pull_request.head.sha }}
