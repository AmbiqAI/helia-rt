name: heliaRT Unit Tests

on:

  workflow_call:
    inputs:
      trigger-sha:
        required: true
        type: string
    secrets:
      NS_CMSIS_NN_SSH_KEY:
        required: true
      ARM_UBL_LICENSE_IDENTIFIER:
        required: false

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA). Leave empty to use the current commit."
        required: false
        default: ""

# The CI image is resolved by the `ci-image` setup job below and consumed via
# `needs.ci-image.outputs.image`. `container.image` does not support the `env`
# context, so a tiny setup job is the cleanest way to keep a single pin point.
# Bump the image tag in that one job. See .github/workflows/README.md.

jobs:
  ci-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - id: image
        run: echo "image=ghcr.io/ambiqai/helia-rt-ci:latest" >> "$GITHUB_OUTPUT"

  helia_test:
    needs: ci-image
    runs-on: ubuntu-latest-md
    container:
      image: ${{ needs.ci-image.outputs.image }}

    strategy:
      fail-fast: false
      matrix:
        arch: [ "cortex-m55", "cortex-m4+fp", "cortex-m3" ]
        toolchain: [ "gcc", "atfe" ]
        opt: [ "SPEED", "SIZE" ]
        exclude:
          # ATfE doesn't ship a v7-M (cortex-m3) target out of the box.
          - arch: "cortex-m3"
            toolchain: "atfe"

    env:
      NS_CMSIS_NN_SSH_KEY: ${{ secrets.NS_CMSIS_NN_SSH_KEY }}
      ARM_UBL_LICENSE_IDENTIFIER: ${{ secrets.ARM_UBL_LICENSE_IDENTIFIER }}

    name: test-${{ matrix.arch }}-${{ matrix.toolchain }}-${{ matrix.opt }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.trigger-sha }}

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "*"

      - name: Cache third-party downloads
        uses: actions/cache@v5
        with:
          path: tensorflow/lite/micro/tools/make/downloads
          key: ${{ runner.os }}-third-party-downloads-${{ hashFiles('tensorflow/lite/micro/tools/make/Makefile','tensorflow/lite/micro/tools/make/third_party_downloads.inc','tensorflow/lite/micro/tools/make/*_download.sh','tensorflow/lite/micro/tools/make/ext_libs/*_download.sh','tensorflow/lite/micro/tools/make/ext_libs/helia.inc') }}

      # ccache massively reduces wall-clock for incremental PR pushes
      # (~3x speedup with a warm cache). Install in-workflow for now;
      # baking it into .devcontainer/Dockerfile is a follow-up.
      - name: Install ccache
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            apt-get update && apt-get install -y --no-install-recommends ccache
          fi
          ccache --version | head -1

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          # Save key uses run_id so each run produces a fresh save.
          # restore-keys does prefix-fallback so we always inherit the most
          # recent prior cache for this toolchain+arch slot. Safe with
          # ccache: it hashes preprocessed content + compiler mtime/size,
          # so stale hits are not possible (unlike third-party-downloads).
          key: ${{ runner.os }}-ccache-${{ matrix.toolchain }}-${{ matrix.arch }}-${{ matrix.opt }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.toolchain }}-${{ matrix.arch }}-${{ matrix.opt }}-
            ${{ runner.os }}-ccache-${{ matrix.toolchain }}-${{ matrix.arch }}-

      - name: Testing (${{ matrix.arch }} / ${{ matrix.toolchain }} / ${{ matrix.opt }})
        env:
          CCACHE_WRAP_DIR: ${{ runner.temp }}/ccwrap
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPRESS: "true"
          CCACHE_COMPRESSLEVEL: "6"
          CCACHE_MAXSIZE: "2G"
        run: |
          # Configure & zero stats before the build so the post-build
          # 'ccache -s' line shows only this run.
          ccache -o max_size=${CCACHE_MAXSIZE} || true
          ccache -z || true
          /bin/sh -c "tensorflow/lite/micro/tools/ci_build/test_helia.sh \
          -a ${{ matrix.arch }} -t ${{ matrix.toolchain }} -O ${{ matrix.opt }}"

      - name: Show ccache stats
        if: always()
        run: ccache -s || true
