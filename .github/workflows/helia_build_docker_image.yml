name: heliaRT Docker Image

on:
  workflow_call:
    inputs:
      trigger-sha:
        description: "Commit SHA or ref to build"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      trigger-sha:
        description: "Commit SHA or ref to build (optional)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.trigger-sha || '' }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/ambiqai/helia-rt-ci
  DOCKERFILE: .devcontainer/Dockerfile
  CONTEXT: .

jobs:
  build-and-push:
    runs-on: ubuntu-latest-md

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.trigger-sha || github.sha }}

      - name: Set up QEMU (for multi-arch, optional)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build & push (cached)
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
