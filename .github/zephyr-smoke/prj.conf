# heliaRT Zephyr smoke configuration.
CONFIG_HELIA_RT=y
CONFIG_HELIA_RT_BACKEND_REFERENCE=y

# C++ runtime needed by TFLM / heliaRT. TFLM headers (e.g. tensorflow/lite/array.h)
# use std::conditional_t / std::decay_t which are C++14, and a few newer headers
# need C++17, so request C++17.
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_USE_MODULE=y

# Reasonable footprint for a qemu_cortex_m3 smoke.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192
